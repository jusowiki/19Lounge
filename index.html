<!DOCTYPE html>

<html lang="ko">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NOX</title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

<header class="top-header">

  <button class="icon-btn" id="menuBtn">☰</button>

  <div class="logo" id="homeLogo">

    <h1>NOX</h1>

    <p>남자들의 현실 익명 커뮤니티</p>

  </div>

  <button class="icon-btn">🔍</button>

</header>

<nav class="category-tabs">

  <button class="active" data-category="전체">전체</button>

  <button data-category="라운지">라운지</button>

  <button data-category="국제연애">국제연애</button>

  <button data-category="국제결혼">국제결혼</button>

  <button data-category="연애">연애</button>

  <button data-category="현실고민">현실고민</button>

  <button data-category="후기/썰">후기/썰</button>

  <button data-category="유머">유머</button>

  <button data-category="새벽감성">새벽감성</button>

</nav>

<div class="overlay" id="overlay"></div>

<main class="container">

  <!-- 홈 -->

  <section id="homeView">

    <section class="notice-box">

      <strong>공지</strong>

      <span>비하, 혐오, 불법촬영물, 미성년자 관련 게시물은 삭제됩니다.</span>

    </section>

    <section class="post-section">

      <div class="section-title">

        <h2 id="currentCategoryTitle">최신글</h2>

        <select id="sortSelect">

          <option value="latest">최신순</option>

          <option value="popular">인기순</option>

        </select>

      </div>

      <div id="postList" class="post-list"></div>

    </section>

  </section>

  <!-- 글쓰기 -->

  <section id="writeView" class="hidden">

    <button class="back-btn" id="writeBackBtn">

      ← 목록으로

    </button>

    <div class="write-page">

      <h2>글쓰기</h2>

      <label>카테고리</label>

      <select id="categoryInput">

        <option value="라운지">라운지</option>

        <option value="국제연애">국제연애</option>

        <option value="국제결혼">국제결혼</option>

        <option value="연애">연애</option>

        <option value="현실고민">현실고민</option>

        <option value="후기/썰">후기/썰</option>

        <option value="유머">유머</option>

        <option value="새벽감성">새벽감성</option>

      </select>

      <label>닉네임</label>

      <input id="nicknameInput" type="text" />

      <label>비밀번호</label>

      <input

        id="passwordInput"

        type="password"

        inputmode="numeric"

        maxlength="5"

        placeholder="숫자 5자리"

      />

      <label>제목</label>

      <input id="titleInput" type="text" />

      <label>내용</label>

      <textarea id="contentInput"></textarea>

      <button class="submit-btn" id="submitBtn">

        등록하기

      </button>

    </div>

  </section>

  <!-- 상세 -->

  <section id="detailView" class="hidden">

    <button class="back-btn" id="detailBackBtn">

      ← 목록으로

    </button>

    <article class="detail-card">

      <div class="detail-category" id="detailCategory"></div>

      <h2 id="detailTitle"></h2>

      <div class="meta" id="detailMeta"></div>

      <div class="detail-content" id="detailContent"></div>

      <div class="detail-actions">

        <button id="likeBtn">

          👍 추천 <span id="likeCount">0</span>

        </button>

        <button id="deletePostBtn">

          삭제

        </button>

      </div>

    </article>

    <!-- 댓글 -->

    <section class="comment-section">

      <h3>댓글</h3>

      <div class="comment-write">

        <input id="commentNicknameInput" type="text" />

        <textarea id="commentInput"></textarea>

        <button id="commentSubmitBtn">

          댓글 등록

        </button>

      </div>

      <div id="commentList" class="comment-list"></div>

    </section>

  </section>

</main>

<button class="write-btn" id="writeBtn">

  ✍ 글쓰기

</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="script.js"></script>

</body>

</html>
