<!DOCTYPE html>

<html lang="ko">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>19라운지</title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

<header class="top-header">

  <button class="icon-btn" id="menuBtn">☰</button>

  <div class="logo" onclick="location.href='index.html'">

    <h1>19<span>라운지</span></h1>

    <p>성인 전용 익명 커뮤니티</p>

  </div>

  <button class="icon-btn" id="searchBtn">🔍</button>

</header>

<nav class="category-tabs">

  <button class="active">전체</button>

  <button>자유</button>

  <button>익명</button>

  <button>연애</button>

  <button>후기</button>

  <button>유머</button>

</nav>

<aside class="side-menu" id="sideMenu">

  <h2>19라운지</h2>

  <p class="side-desc">만 19세 이상 성인 전용 커뮤니티</p>

  <ul>

    <li>🏠 홈</li>

    <li>🔥 인기글</li>

    <li>📝 최신글</li>

    <li>📢 공지사항</li>

    <li>🚨 신고/문의</li>

    <li>⚙️ 이용규칙</li>

  </ul>

</aside>

<div class="overlay" id="overlay"></div>

<main class="container">

  <section class="notice-box">

    <strong>공지</strong>

    <span>불법촬영물, 미성년자 관련 게시물, 개인정보 유출은 즉시 삭제 및 차단됩니다.</span>

  </section>

  <section class="hot-section">

    <div class="section-title">

      <h2>🔥 실시간 인기글</h2>

      <a href="#">더보기</a>

    </div>

    <div id="hotPosts" class="hot-list"></div>

  </section>

  <section class="post-section">

    <div class="section-title">

      <h2>최신글</h2>

      <select id="sortSelect">

        <option>최신순</option>

        <option>인기순</option>

        <option>댓글순</option>

      </select>

    </div>

    <div id="postList" class="post-list"></div>

  </section>

</main>

<button class="write-btn" id="writeBtn">✍ 글쓰기</button>

<div class="write-modal" id="writeModal">

  <div class="modal-card">

    <h2>글쓰기</h2>

    <input id="titleInput" type="text" placeholder="제목을 입력하세요" />

    <textarea id="contentInput" placeholder="내용을 입력하세요"></textarea>

    <div class="modal-actions">

      <button id="cancelBtn">취소</button>

      <button id="submitBtn">등록</button>

    </div>

  </div>

</div>

<!-- supabase 먼저 -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 그 다음 script.js -->

<script src="script.js"></script>

</body>

</html>
