<!DOCTYPE html>

<html lang="ko">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NOX</title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

<header class="top-header">

  <button class="icon-btn" id="menuBtn">☰</button>

  <div class="logo" onclick="location.href='index.html'">

    <h1>NOX</h1>

    <p>남자들의 현실 익명 커뮤니티</p>

  </div>

  <button class="icon-btn" id="searchBtn">🔍</button>

</header>

<nav class="category-tabs">

  <button class="active" data-category="전체">전체</button>

  <button data-category="라운지">라운지</button>

  <button data-category="국제연애">국제연애</button>

  <button data-category="국제결혼">국제결혼</button>

  <button data-category="연애">연애</button>

  <button data-category="현실고민">현실고민</button>

  <button data-category="후기/썰">후기/썰</button>

  <button data-category="유머">유머</button>

  <button data-category="새벽감성">새벽감성</button>

</nav>

<aside class="side-menu" id="sideMenu">

  <h2>NOX</h2>

  <p class="side-desc">국제연애·국제결혼·현실연애 정보를 공유하는 익명 커뮤니티</p>

  <ul>

    <li>🏠 홈</li>

    <li>🔥 인기글</li>

    <li>🌏 국제연애</li>

    <li>💍 국제결혼</li>

    <li>🧠 현실고민</li>

    <li>📢 공지사항</li>

    <li>🚨 신고/문의</li>

  </ul>

</aside>

<div class="overlay" id="overlay"></div>

<main class="container">

  <section class="notice-box">

    <strong>공지</strong>

    <span>비하, 혐오, 불법촬영물, 미성년자 관련 게시물, 개인정보 유출은 즉시 삭제됩니다.</span>

  </section>

  <section class="hot-section">

    <div class="section-title">

      <h2>🔥 실시간 인기글</h2>

    </div>

    <div id="hotPosts" class="hot-list"></div>

  </section>

  <section class="post-section">

    <div class="section-title">

      <h2 id="currentCategoryTitle">최신글</h2>

      <select id="sortSelect">

        <option value="latest">최신순</option>

        <option value="popular">인기순</option>

      </select>

    </div>

    <div id="postList" class="post-list"></div>

  </section>

</main>

<button class="write-btn" id="writeBtn">✍ 글쓰기</button>

<div class="write-modal" id="writeModal">

  <div class="modal-card">

    <h2>글쓰기</h2>

    <select id="categoryInput">

      <option value="라운지">라운지</option>

      <option value="국제연애">국제연애</option>

      <option value="국제결혼">국제결혼</option>

      <option value="연애">연애</option>

      <option value="현실고민">현실고민</option>

      <option value="후기/썰">후기/썰</option>

      <option value="유머">유머</option>

      <option value="새벽감성">새벽감성</option>

    </select>

    <input id="nicknameInput" type="text" placeholder="닉네임" />

    <input id="titleInput" type="text" placeholder="제목을 입력하세요" />

    <textarea id="contentInput" placeholder="내용을 입력하세요"></textarea>

    <div class="modal-actions">

      <button id="cancelBtn">취소</button>

      <button id="submitBtn">등록</button>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="script.js"></script>

</body>

</html>
